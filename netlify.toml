[build]
  command = "npm run build"
  publish = "fronti-admin/.next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=dev"

[functions]
  directory = "netlify/functions"
  node_bundler = "nft"
  included_files = [
    "fronti-backend/dist/**",
    "fronti-backend/node_modules/.prisma/client/**",
    "fronti-backend/uploads/**"
  ]

[[redirects]]
  from = "/api/backend/*"
  to = "/.netlify/functions/backend/:splat"
  status = 200

[[plugins]]
  package = "@netlify/plugin-nextjs"
